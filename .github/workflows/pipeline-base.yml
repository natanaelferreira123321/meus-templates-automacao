name: Pipeline Padrao (Copia e Cola)

on: [push] # Dispara toda vez que voce salva algo

jobs:
  verificacao:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Baixar Codigo
        uses: actions/checkout@v4

      - name: 2. Preparar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. Executar Testes Automatizados
        run: python test_main.py # Ele sempre vai procurar este arquivo

      - name: 4. Coletar Resultados (Arquivos Gerados)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: entrega-do-projeto
          path: |
            *.db
            *.txt
            *.xlsx
